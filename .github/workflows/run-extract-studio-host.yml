name: Run Studio host extraction

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  extract:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/extract-studio-host'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Studio branch
        uses: actions/checkout@v4
        with:
          ref: agent/extract-studio-host
          fetch-depth: 0

      - name: Download final ankhorage4 host source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .migration/ankhorage4
          curl --fail --silent --show-error --location \
            https://github.com/ankhorage/ankhorage4/archive/6214ac08f229307d473594bb38de2af4f57b049c.tar.gz \
            | tar --extract --gzip --strip-components=1 --directory .migration/ankhorage4

      - name: Execute extraction and formatting blocks
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          workflow = Path('.github/workflows/extract-studio-host.yml').read_text().splitlines()
          blocks = []
          index = 0
          while index < len(workflow):
              if workflow[index].strip() == 'run: |':
                  index += 1
                  lines = []
                  while index < len(workflow):
                      line = workflow[index]
                      if line.startswith('      - name:'):
                          break
                      lines.append(line[10:] if line.startswith('          ') else line)
                      index += 1
                  blocks.append('\n'.join(lines))
                  continue
              index += 1

          if len(blocks) < 2:
              raise SystemExit('Expected extraction and formatting run blocks.')

          for block in blocks[:2]:
              subprocess.run(['bash', '-lc', block], check=True)
          PY

      - name: Commit extracted Studio host
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/extract-studio-host.yml
          rm .github/workflows/run-extract-studio-host.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Extract the local Studio host"
          git push origin HEAD:agent/extract-studio-host
