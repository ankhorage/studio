name: Run Studio host extraction

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  extract:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/extract-studio-host'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Studio branch
        uses: actions/checkout@v4
        with:
          ref: agent/extract-studio-host
          fetch-depth: 0

      - name: Download exported ankhorage4 host source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .migration/artifact .migration/ankhorage4
          curl --fail --silent --show-error --location \
            'https://sdmntprpolandcentral.oaiusercontent.com/files/00000000-38c8-720a-a410-f1d3a7291107/raw?se=2026-07-10T21:58:40Z&sp=r&sv=2026-02-06&sr=b&scid=3f998ab6-5cde-57c7-8c21-ecfcdffdc2fb&skoid=d4d17077-8f33-42a9-bd8b-aa9d5eaf5320&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-10T05:23:33Z&ske=2026-07-12T05:23:33Z&sks=b&skv=2026-02-06&sig=oKT%2BjMYnJnbbfQJK5yL2d%2B7mLYU6xwlUS21rN4FBLkY%3D' \
            --output .migration/studio-host-source.zip
          unzip -q .migration/studio-host-source.zip -d .migration/artifact
          tar --extract --gzip \
            --file .migration/artifact/studio-host-source.tar.gz \
            --directory .migration/ankhorage4

      - name: Execute extraction and formatting blocks
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          workflow = Path('.github/workflows/extract-studio-host.yml').read_text().splitlines()
          blocks = []
          index = 0
          while index < len(workflow):
              if workflow[index].strip() == 'run: |':
                  index += 1
                  lines = []
                  while index < len(workflow):
                      line = workflow[index]
                      if line.startswith('      - name:'):
                          break
                      lines.append(line[10:] if line.startswith('          ') else line)
                      index += 1
                  blocks.append('\n'.join(lines))
                  continue
              index += 1

          if len(blocks) < 2:
              raise SystemExit('Expected extraction and formatting run blocks.')

          for block in blocks[:2]:
              subprocess.run(['bash', '-lc', block], check=True)
          PY

      - name: Commit extracted Studio host
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/extract-studio-host.yml
          rm .github/workflows/run-extract-studio-host.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Extract the local Studio host"
          git push origin HEAD:agent/extract-studio-host
