name: Finalize Phase 2 secret bridge

on:
  push:
    branches:
      - phase2/auth-secret-management

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase2/auth-secret-management
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Finalize central route and host composition
        run: |
          python3 <<'PY'
          from pathlib import Path

          index_path = Path('src/index.ts')
          index_text = index_path.read_text()
          old_route = """export type StudioAdminRoutePath =
  '/' | '/ankh/apis' | '/ankh/auth' | '/ankh/properties' | '/ankh/theme';"""
          new_route = """export type StudioAdminRoutePath =
  | '/'
  | '/ankh/apis'
  | '/ankh/auth'
  | '/ankh/properties'
  | '/ankh/secrets'
  | '/ankh/theme';"""
          if old_route in index_text:
              index_text = index_text.replace(old_route, new_route, 1)
          index_path.write_text(index_text)

          route_path = Path('src/studioAdminRouteModel.ts')
          route_text = route_path.read_text()
          route_text = route_text.replace(
              "export type StudioResolvedAdminRoutePath = StudioAdminRoutePath | '/ankh/secrets';\n\n",
              '',
          ).replace('StudioResolvedAdminRoutePath', 'StudioAdminRoutePath')
          route_path.write_text(route_text)

          server_path = Path('src/host/http/server.ts')
          server_text = server_path.read_text()
          import_line = "import { isOriginAllowed } from './security';"
          if "import { registerProjectSecretRoutes } from './secretRoutes';" not in server_text:
              server_text = server_text.replace(
                  import_line,
                  import_line + "\nimport { registerProjectSecretRoutes } from './secretRoutes';",
                  1,
              )
          marker = '  // Helper inside scope to access dependencies'
          registration = """  registerProjectSecretRoutes(fastify, {
    projectManager,
    workspaceRoot: projectRoot,
  });

"""
          if registration not in server_text:
              server_text = server_text.replace(marker, registration + marker, 1)
          server_path.write_text(server_text)

          Path('src/host/http/standalone.ts').write_text(
              "import { startStudioHostServer } from './server';\n\n"
              "const rawPortValue: unknown = process.env.ANKHORAGE_STUDIO_HOST_PORT;\n"
              "const portValue = typeof rawPortValue === 'string' ? rawPortValue : undefined;\n"
              "const port = portValue === undefined ? 3000 : Number.parseInt(portValue, 10);\n"
              "if (!Number.isInteger(port) || port < 1 || port > 65_535) {\n"
              "  throw new Error(`Invalid ANKHORAGE_STUDIO_HOST_PORT: ${portValue}`);\n"
              "}\n\n"
              "await startStudioHostServer({ port, host: '127.0.0.1' });\n"
          )

          wrapper = Path('src/host/http/serverWithSecrets.ts')
          if wrapper.exists():
              wrapper.unlink()
          PY

      - name: Install and verify
        run: |
          bun install
          bun run format
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run docs
          bun run format
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run format:check

      - name: Commit finalized branch
        run: |
          rm .github/workflows/finalize-phase2-secret-bridge.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize Phase 2 secret bridge"
          git push origin HEAD:phase2/auth-secret-management
