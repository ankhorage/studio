## Local Studio host ownership

Issue #56 establishes `src/host/` as the direct owner of the local Studio application lifecycle. This supersedes older transition-host guidance that placed these responsibilities in `ankhorage4`.

- UI code talks to the thin local HTTP adapter.
- CLI commands call shared host services directly.
- Host services may use Node/Bun filesystem and child-process APIs.
- Host-only dependencies must not leak into package-neutral authoring helpers.
- Never proxy, import, or fall back to `ankhorage4`.
- Do not add `@ankh/*` compatibility packages.

"""
