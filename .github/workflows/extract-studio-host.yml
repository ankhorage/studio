name: Extract Studio host

on:
  push:
    branches:
      - agent/extract-studio-host

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Studio
        uses: actions/checkout@v4
        with:
          ref: agent/extract-studio-host
          fetch-depth: 0

      - name: Check out final ankhorage4 host source
        uses: actions/checkout@v4
        with:
          repository: ankhorage/ankhorage4
          ref: 6214ac08f229307d473594bb38de2af4f57b049c
          path: .migration/ankhorage4

      - name: Extract host ownership
        shell: bash
        run: |
          set -euo pipefail
          rm -rf src/host
          mkdir -p src/host
          for directory in bridge layout manifestSystem modules orchestrator templateRegistry utils zoraExtensions; do
            cp -R ".migration/ankhorage4/packages/cli/src/${directory}" "src/host/${directory}"
          done
          mv src/host/bridge src/host/http

          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          root = Path('.')
          host = root / 'src' / 'host'

          for path in host.rglob('*'):
              if path.is_file() and path.suffix in {'.ts', '.tsx'}:
                  text = path.read_text()
                  text = text.replace('@ankh/cli', '@ankhorage/studio')
                  text = text.replace('createBridgeServer', 'createStudioHostServer')
                  text = text.replace('startBridgeServer', 'startStudioHostServer')
                  text = text.replace('Ankh Bridge Server', 'Ankhorage Studio Host')
                  text = text.replace('bridge server', 'Studio host')
                  text = text.replace('Bridge Server', 'Studio Host')
                  path.write_text(text)

          (host / 'orchestrator' / 'projectPaths.ts').write_text("""import path from 'node:path';

const PROJECT_ID_PATTERN = /^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$/u;
const RESERVED_PROJECT_IDS = new Set(['studio']);

export function getAppsRoot(rootPath: string) {
  return path.join(rootPath, 'apps');
}

export function assertProjectId(projectId: string) {
  if (
    projectId.length === 0 ||
    path.basename(projectId) !== projectId ||
    !PROJECT_ID_PATTERN.test(projectId) ||
    RESERVED_PROJECT_IDS.has(projectId)
  ) {
    throw new Error(`Invalid project id: ${projectId}`);
  }
  return projectId;
}

export function getProjectPath(rootPath: string, projectId: string) {
  const appsRoot = path.resolve(getAppsRoot(rootPath));
  const safeId = assertProjectId(projectId);
  const projectPath = path.resolve(appsRoot, safeId);
  if (path.dirname(projectPath) !== appsRoot) {
    throw new Error('Security check failed: project path escaped the workspace apps directory.');
  }
  return projectPath;
}
""")

