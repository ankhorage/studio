name: Fix Phase 3 consumer style

on:
  push:
    branches:
      - phase3/oauth-fixture-consumer-smoke

permissions:
  contents: write

jobs:
  fix-style:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase3/oauth-fixture-consumer-smoke
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply safe fixes
        run: |
          bun run lint:fix || true
          bun run format
          bun run lint > phase3-consumer-lint.txt 2>&1 || true

      - name: Commit fixes and diagnostics
        run: |
          if git diff --quiet && [ ! -f phase3-consumer-lint.txt ]; then
            echo "No style changes or diagnostics."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/host/oauthFixtureConsumer.smoke.test.ts phase3-consumer-lint.txt
          git commit -m "style: format OAuth consumer smoke"
          git push
