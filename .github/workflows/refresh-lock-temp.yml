name: Refresh lockfile temporary

on:
  push:
    branches:
      - chore/update-expo-sdk54-patches

permissions:
  contents: write

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/update-expo-sdk54-patches
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Refresh lockfile
        run: bun install

      - name: Commit lockfile when changed
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: refresh Bun lockfile"
          git push origin HEAD:chore/update-expo-sdk54-patches
