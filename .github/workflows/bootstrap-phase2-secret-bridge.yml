name: Bootstrap Phase 2 secret bridge

on:
  push:
    branches:
      - phase2/auth-secret-management

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase2/auth-secret-management
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Integrate route and host boundaries
        run: |
          python3 <<'PY'
          from pathlib import Path

          index_path = Path('src/index.ts')
          index_text = index_path.read_text()
          old_route = """export type StudioAdminRoutePath =
  '/' | '/ankh/apis' | '/ankh/auth' | '/ankh/properties' | '/ankh/theme';"""
          new_route = """export type StudioAdminRoutePath =
  | '/'
  | '/ankh/apis'
  | '/ankh/auth'
  | '/ankh/properties'
  | '/ankh/secrets'
  | '/ankh/theme';"""
          if old_route not in index_text:
              raise SystemExit('StudioAdminRoutePath declaration was not found.')
          index_path.write_text(index_text.replace(old_route, new_route, 1))

          server_path = Path('src/host/http/server.ts')
          server_text = server_path.read_text()
          import_line = "import { isOriginAllowed } from './security';"
          replacement = import_line + "\nimport { registerProjectSecretRoutes } from './secretRoutes';"
          if import_line not in server_text:
              raise SystemExit('Studio host security import was not found.')
          server_text = server_text.replace(import_line, replacement, 1)

          marker = '  // Helper inside scope to access dependencies'
          registration = """  registerProjectSecretRoutes(fastify, {
    projectManager,
    workspaceRoot: projectRoot,
  });

"""
          if marker not in server_text:
              raise SystemExit('Studio host route registration marker was not found.')
          server_path.write_text(server_text.replace(marker, registration + marker, 1))
          PY

      - name: Update released dependencies and metadata
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path('package.json')
          package = json.loads(path.read_text())
          dependencies = package['dependencies']
          dependencies['@ankhorage/contracts'] = '^2.1.0'
          dependencies['@ankhorage/infra'] = '^0.4.0'
          dependencies['@ankhorage/supabase-auth'] = '^0.4.0'
          dependencies['@ankhorage/supabase-vault'] = '^0.2.0'
          dependencies['@ankhorage/templates'] = '^2.1.0'
          package['dependencies'] = dict(sorted(dependencies.items()))

          capabilities = package['ankh']['capabilities']
          for capability in [
              'studio.secrets.list',
              'studio.secrets.create',
              'studio.secrets.replace',
              'studio.secrets.remove',
          ]:
              if capability not in capabilities:
                  capabilities.append(capability)

          for keyword in ['oauth', 'secret-store', 'supabase-vault']:
              if keyword not in package['keywords']:
                  package['keywords'].append(keyword)

          path.write_text(json.dumps(package, indent=2) + '\n')
          PY

      - name: Install, format, and verify
        run: |
          bun install
          bun run format
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run format:check

      - name: Generate docs and verify again
        run: |
          bun run docs
          bun run format
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run format:check

      - name: Commit finalized integration
        run: |
          rm .github/workflows/bootstrap-phase2-secret-bridge.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize Phase 2 secret bridge"
          git push origin HEAD:phase2/auth-secret-management
