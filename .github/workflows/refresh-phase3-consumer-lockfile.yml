name: Refresh Phase 3 consumer lockfile

on:
  push:
    branches:
      - phase3/oauth-fixture-consumer-smoke

permissions:
  contents: write

jobs:
  refresh-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase3/oauth-fixture-consumer-smoke
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Refresh lockfile
        run: bun install

      - name: Commit lockfile
        run: |
          if git diff --quiet -- bun.lock; then
            echo "Lockfile is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: refresh Phase 3 consumer lockfile"
          git push
