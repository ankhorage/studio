name: Fix Studio host public boundaries

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/extract-studio-host'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Studio branch
        uses: actions/checkout@v4
        with:
          ref: agent/extract-studio-host
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Tighten host boundaries
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              'src/host/orchestrator/infraGenerator.ts': (
                  'export function resolveProjectFile',
                  'function resolveProjectFile',
              ),
              'src/host/orchestrator/infraRuntime.ts': (
                  'export function resolveProjectInfraScriptPath',
                  'function resolveProjectInfraScriptPath',
              ),
              'src/host/orchestrator/projectDeletion.ts': (
                  'export function getSupabaseContainersForProject',
                  'function getSupabaseContainersForProject',
              ),
              'src/host/templateRegistry/index.ts': (
                  'export const PROJECT_TEMPLATE_SUMMARIES',
                  'const PROJECT_TEMPLATE_SUMMARIES',
              ),
          }

          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'Missing expected declaration in {filename}: {old}')
              path.write_text(text.replace(old, new, 1))

          knip = Path('knip.config.ts')
          text = knip.read_text()
          anchor = "        'src/cli/index.ts',\n"
          entry = "        'src/host/index.ts',\n"
          if entry not in text:
              if anchor not in text:
                  raise SystemExit('Could not locate Knip entry anchor.')
              text = text.replace(anchor, anchor + entry, 1)
          knip.write_text(text)

          zora = Path('src/host/zoraExtensions/index.ts')
          text = zora.read_text()
          start_marker = 'export function createZoraExtensionComponentRegistrySource('
          end_marker = 'function formatRegistryKey'
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Could not locate unused Zora registry source function.')
          zora.write_text(text[:start] + text[end:])
          PY

          bun install
          bun run format

      - name: Commit boundary cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/capture-studio-host-knip.yml
          rm .github/workflows/fix-studio-host-knip.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Tighten Studio host public boundaries"
          git push origin HEAD:agent/extract-studio-host
