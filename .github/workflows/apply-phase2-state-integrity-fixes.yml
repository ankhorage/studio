name: Apply Phase 2 state integrity fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply targeted fixes
        run: |
          python scripts/apply_phase2_state_integrity_fixes.py
          rm -f scripts/apply_phase2_state_integrity_fixes.py
          rm -f .github/workflows/apply-phase2-state-integrity-fixes.yml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Format and validate
        run: |
          bun run lint:fix
          bun run build
          bun run test
          bun run knip
          bun run typecheck
          bun run format:check
          bun run docs

      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'fix: preserve Phase 2 auth and inventory state'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
