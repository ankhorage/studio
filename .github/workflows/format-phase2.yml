name: Format Phase 2 branch

on:
  push:
    branches:
      - phase2/auth-secret-management

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase2/auth-secret-management
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - run: bun install --frozen-lockfile
      - run: bun run format
      - name: Commit formatting
        run: |
          rm .github/workflows/format-phase2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes."
          else
            git commit -m "style: format Phase 2 secret management"
            git push origin HEAD:phase2/auth-secret-management
          fi
