name: Apply native peer ownership fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/fix-studio-native-peer-ownership'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-studio-native-peer-ownership
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Update package contracts
        run: |
          cat > /tmp/update-packages.mjs <<'EOF'
          const rootPath = 'package.json';
          const appPath = 'apps/studio/package.json';
          const root = await Bun.file(rootPath).json();
          const app = await Bun.file(appPath).json();

          root.peerDependencies['@react-native-picker/picker'] = '2.11.1';
          root.peerDependencies['expo-linear-gradient'] = '~15.0.8';

          app.dependencies['@react-native-picker/picker'] = '2.11.1';
          app.dependencies['expo-linear-gradient'] = '~15.0.8';
          app.scripts['export:web'] = 'bun run prepare:root-package && expo export --platform web --output-dir dist-web';

          await Bun.write(rootPath, `${JSON.stringify(root, null, 2)}\n`);
          await Bun.write(appPath, `${JSON.stringify(app, null, 2)}\n`);
          EOF
          bun /tmp/update-packages.mjs
          bun install --no-frozen-lockfile

      - name: Commit generated lockfile
        run: |
          rm .github/workflows/apply-native-peer-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json apps/studio/package.json bun.lock .github/workflows/apply-native-peer-fix.yml
          git commit -m "Own Studio native dependencies in the app"
          git push origin HEAD:agent/fix-studio-native-peer-ownership
