name: Finalize extracted Studio host

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/extract-studio-host'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Studio branch
        uses: actions/checkout@v4
        with:
          ref: agent/extract-studio-host
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Apply repository fixers
        shell: bash
        run: |
          set -euo pipefail
          bun install
          bun run lint:fix || true
          bun run format
          bun run docs

      - name: Commit finalized host
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-studio-host.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Finalize the local Studio host"
          git push origin HEAD:agent/extract-studio-host
