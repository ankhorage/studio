name: Format Phase 3 consumer docs

on:
  push:
    branches:
      - phase3/oauth-fixture-consumer-smoke

permissions:
  contents: write

jobs:
  format-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase3/oauth-fixture-consumer-smoke
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format generated documentation
        run: ankhorage-prettier --write README.md paradox

      - name: Commit formatting
        run: |
          if git diff --quiet -- README.md paradox; then
            echo "Generated documentation is already formatted."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md paradox
          git commit -m "style: format generated Phase 3 docs"
          git push
