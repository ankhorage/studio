name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Run build
        run: bun run build

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run Knip
        run: bun run knip

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          bun run test 2>&1 | tee studio-host-tests.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-host-tests
          path: studio-host-tests.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Run typecheck
        run: bun run typecheck

      - name: Run docs check
        run: bun run docs

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: bun run changeset:status
