name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Apply targeted Phase 2 auth lint corrections
        if: github.event_name == 'pull_request' && github.head_ref == 'phase2/auth-settings'
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('src/authSettings.ts')
          content = path.read_text()
          start_marker = "  if (!Array.isArray(value) || value.some((entry) => typeof entry !== 'string')) {"
          end_marker = "  if (allowed && normalized.some((entry) => !allowed.has(entry))) {"
          start = content.find(start_marker)
          end = content.find(end_marker, start)
          if start < 0 or end < 0:
            raise SystemExit('authSettings readStringArray target not found')
          replacement = (
              "  if (!Array.isArray(value)) {\n"
              "    return invalid(`${label} must be a string array.`);\n"
              "  }\n"
              "  const entries: string[] = [];\n"
              "  for (const entry of value as readonly unknown[]) {\n"
              "    if (typeof entry !== 'string') {\n"
              "      return invalid(`${label} must be a string array.`);\n"
              "    }\n"
              "    const normalizedEntry = entry.trim();\n"
              "    if (normalizedEntry) entries.push(normalizedEntry);\n"
              "  }\n"
              "  const normalized = [...new Set(entries)];\n"
          )
          path.write_text(content[:start] + replacement + content[end:])

          path = Path('src/projectAuthApi.ts')
          content = path.read_text()
          old = "if (!record || record.ok !== true || record.state !== expectedState) {"
          new = "if (record?.ok !== true || record?.state !== expectedState) {"
          if old not in content:
            raise SystemExit('projectAuthApi optional-chain target not found')
          path.write_text(content.replace(old, new, 1))

          path = Path('src/host/auth/projectAuthService.test.ts')
          content = path.read_text()
          replacements = [
              (
                  "      getStudioManifest: async () => {\n        throw new Error('No draft');\n      },",
                  "      getStudioManifest: () => Promise.reject(new Error('No draft')),")
              ,(
                  "      getProjectManifest: async () => createManifest(),",
                  "      getProjectManifest: () => Promise.resolve(createManifest()),")
              ,(
                  "      saveStudioManifest: async ({ manifest }: { projectId: string; manifest: AppManifest }) => {\n        saved.push(manifest);\n        return { success: true };\n      },",
                  "      saveStudioManifest: ({ manifest }: { projectId: string; manifest: AppManifest }) => {\n        saved.push(manifest);\n        return Promise.resolve({ success: true });\n      },")
              ,(
                  "      getStudioManifest: async () => createManifest(),",
                  "      getStudioManifest: () => Promise.resolve(createManifest()),")
              ,(
                  "      saveStudioManifest: async () => {\n        saveCount += 1;\n        return { success: true };\n      },",
                  "      saveStudioManifest: () => {\n        saveCount += 1;\n        return Promise.resolve({ success: true });\n      },")
          ]
          for old, new in replacements:
            if old not in content:
              raise SystemExit(f'projectAuthService test target not found: {old!r}')
            content = content.replace(old, new, 1)
          path.write_text(content)
          PY
          bun run lint:fix

      - name: Commit targeted Phase 2 auth lint corrections
        if: github.event_name == 'pull_request' && github.head_ref == 'phase2/auth-settings'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/authSettings.ts src/projectAuthApi.ts src/host/auth/projectAuthService.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: fix Phase 2 auth lint errors"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Run build
        run: bun run build

      - name: Check package entrypoints
        run: |
          test -f dist/root.js
          test -f dist/root.d.ts
          test -f dist/host/index.js
          test -f dist/host/index.d.ts

      - name: Typecheck Studio app consumer
        run: bun run type-check:studio

      - name: Bundle Studio web app
        run: |
          cd apps/studio
          bun run prepare:root-package
          bunx expo export --platform web --output-dir "$RUNNER_TEMP/studio-web"

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run Knip
        run: bun run knip

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Run docs check
        run: bun run docs

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: bun run changeset:status
