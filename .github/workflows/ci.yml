name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build
        run: bun run build

      - name: Validate Ankhorage repository
        run: bunx @ankhorage/ankh doctor validate .

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run Knip
        run: bun run knip

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: bun run changeset:status

      - name: Regenerate documentation
        if: github.head_ref == 'agent/studio-cli-dev-usage'
        run: |
          bun run docs
          bun run format
          bun run format:check

      - name: Commit generated documentation
        if: github.head_ref == 'agent/studio-cli-dev-usage'
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "document Studio CLI and local development"
            git push origin HEAD:agent/studio-cli-dev-usage
          fi
