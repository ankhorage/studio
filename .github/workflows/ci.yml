name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install

      - name: Capture targeted Phase 2 auth lint fixes and diagnostics
        if: github.event_name == 'pull_request' && github.head_ref == 'phase2/auth-settings'
        run: |
          set +e
          bun run lint:fix > .phase2-auth-lint.txt 2>&1
          echo $? > .phase2-auth-lint-status.txt
          exit 0

      - name: Commit targeted Phase 2 auth lint results
        if: github.event_name == 'pull_request' && github.head_ref == 'phase2/auth-settings'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .phase2-auth-lint.txt .phase2-auth-lint-status.txt src/authSettings.ts src/authSettings.test.ts src/projectAuthApi.ts src/projectAuthApi.test.ts src/host/auth/projectAuthService.ts src/host/auth/projectAuthService.test.ts src/host/http/authRoutes.ts src/host/http/serverWithSecrets.ts src/host/index.ts src/ui/StudioAuthSettingsOverlay.tsx src/ui/useStudioAppBarAugmentation.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: capture Phase 2 auth lint results"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Run build
        run: bun run build

      - name: Check package entrypoints
        run: |
          test -f dist/root.js
          test -f dist/root.d.ts
          test -f dist/host/index.js
          test -f dist/host/index.d.ts

      - name: Typecheck Studio app consumer
        run: bun run type-check:studio

      - name: Bundle Studio web app
        run: |
          cd apps/studio
          bun run prepare:root-package
          bunx expo export --platform web --output-dir "$RUNNER_TEMP/studio-web"

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run Knip
        run: bun run knip

      - name: Run tests
        run: bun run test

      - name: Run typecheck
        run: bun run typecheck

      - name: Run docs check
        run: bun run docs

      - name: Check changesets
        if: github.event_name == 'pull_request'
        run: bun run changeset:status
