name: Phase 2 Auth Autofix

on:
  push:
    branches:
      - phase2/auth-settings

permissions:
  contents: write

jobs:
  autofix:
    if: ${{ !contains(github.event.head_commit.message, 'chore: autofix Phase 2 auth') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase2/auth-settings
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply canonical lint fixes
        run: bun run lint:fix

      - name: Commit source fixes only
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/authSettings.ts src/authSettings.test.ts src/projectAuthApi.ts src/projectAuthApi.test.ts src/host/auth/projectAuthService.ts src/host/auth/projectAuthService.test.ts src/host/http/authRoutes.ts src/host/http/serverWithSecrets.ts src/host/index.ts src/ui/StudioAuthSettingsOverlay.tsx src/ui/useStudioAppBarAugmentation.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: autofix Phase 2 auth"
          git push origin HEAD:phase2/auth-settings
