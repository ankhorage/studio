name: Capture Phase 2 format diagnostics

on:
  push:
    branches:
      - phase2/auth-secret-management

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase2/auth-secret-management
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'
      - run: bun install --frozen-lockfile
      - name: Capture format output
        run: bun run format:check > phase2-format-output.txt 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase2-format-output.txt
          git commit -m "ci: capture Phase 2 format output" || exit 0
          git push origin HEAD:phase2/auth-secret-management
