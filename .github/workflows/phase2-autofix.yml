name: Phase 2 Autofix

on:
  push:
    branches:
      - phase2/auth-secrets-ui

permissions:
  contents: write

jobs:
  autofix:
    if: ${{ !contains(github.event.head_commit.message, 'chore: autofix Phase 2 UI') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase2/auth-secrets-ui
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply canonical lint and format fixes
        run: |
          bun run lint:fix
          bun run format

      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: autofix Phase 2 UI"
          git push origin HEAD:phase2/auth-secrets-ui
